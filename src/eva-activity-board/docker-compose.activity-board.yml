# EVA Activity Board — standalone service
# Usage: docker compose -f docker-compose.activity-board.yml up -d
# Or merge into main Eva docker-compose.yml

version: "3.9"

services:
  eva-activity-board:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eva-activity-board
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_PATH=/data/data.db
    volumes:
      - eva_activity_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.eva-board.rule=Host(`eva.mangotec.ai`)"
      - "traefik.http.routers.eva-board.tls=true"
      - "traefik.http.services.eva-board.loadbalancer.server.port=3001"

volumes:
  eva_activity_data:
    driver: local
