<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy — Mangotec LLC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #030712;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid #1f2937;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #030712;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #0ea5e9, #06b6d4 60%, #0891b2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: #06b6d4;
      font-family: 'Courier New', monospace;
    }

    .logo-sub {
      font-size: 10px;
      color: #4b5563;
      letter-spacing: 0.08em;
      font-family: 'Courier New', monospace;
    }

    .back-link {
      font-size: 12px;
      color: #4b5563;
      text-decoration: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }
    .back-link:hover { color: #06b6d4; }

    .page-title {
      padding: 32px 24px 20px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .page-title h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f9fafb;
      letter-spacing: 0.02em;
    }

    .page-title p {
      font-size: 13px;
      color: #6b7280;
      margin-top: 6px;
    }

    .policy-frame-wrap {
      flex: 1;
      max-width: 900px;
      margin: 0 auto 40px;
      width: 100%;
      padding: 0 24px;
    }

    .policy-frame-wrap iframe {
      width: 100%;
      min-height: 80vh;
      border: 1px solid #1f2937;
      border-radius: 8px;
      background: #fff;
    }

    footer {
      border-top: 1px solid #111827;
      padding: 12px 24px;
      text-align: center;
      font-size: 11px;
      color: #374151;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="logo">
      <div class="logo-mark">EVA</div>
      <div>
        <div class="logo-text">MANGOTEC LLC</div>

      </div>
    </a>
    <a href="/" class="back-link">← BACK TO EVA</a>
  </header>

  <div class="page-title">
    <h1>Privacy Policy</h1>
    <p>Mangotec, LLC · eva.mangotec.ai · Last updated May 18, 2026</p>
  </div>

  <div class="policy-frame-wrap">
    <iframe
      src="https://app.termly.io/policy-viewer/policy.html?policyUUID=fa8251dc-34a6-4864-b288-933da5e7f10c"
      title="Mangotec LLC Privacy Policy"
      frameborder="0"
      loading="lazy"
    ></iframe>
  </div>

  <footer>
    MANGOTEC LLC · info@mangotecusa.com · 20774 W LIANA CT, PORTER RANCH, CA 91326
  </footer>

</body>
